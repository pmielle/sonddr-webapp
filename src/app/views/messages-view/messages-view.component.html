<app-top-bar [scroll-container]="this.scrollContainer">
    <h1>Messages</h1>
    <div class="spacer"></div>
    <app-profile-picture *ngIf="(this.auth.user$ | async) as user" [user]="user" [routerLink]="['/user', user.id]"></app-profile-picture>
</app-top-bar>

<div id="discussions">
    <app-h-scroll>
        <app-profile-picture *ngIf="(this.auth.user$ | async) as user" [user]="user" [routerLink]="['/user', user.id]" [large]="true"></app-profile-picture>
    </app-h-scroll>
</div>
