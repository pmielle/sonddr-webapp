<div id="container" class="flex">

    <!-- either static or dynamic background -->
    <div *ngIf="this.scrollContainer === null else dynamicBackground" id="background" [style.backgroundColor]="this.headerColor"></div>
    <ng-template #dynamicBackground>
        <div id="background" [style.backgroundColor]="this.scrolled ? this.headerColor : 'transparent'"></div>
    </ng-template>
    
    <!-- content -->
    <ng-content></ng-content>
</div>
