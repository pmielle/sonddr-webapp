<div id="container">
    <div id="cover" class="pointer" [routerLink]="['/idea', this.idea.id]" [style.background]="'gray'" mat-ripple></div>
    <div id="grid">
        <h2 id="title" class="pointer" [routerLink]="['/idea', this.idea.id]">{{ this.idea.title }}</h2>
        <app-profile-picture [routerLink]="['/user', this.idea.author.id]"></app-profile-picture>
        <p id="subtitle"><span class="pointer" [routerLink]="['/user', this.idea.author.id]">{{ this.idea.author.name }}</span>, 3 hours ago</p>
    </div>
</div>
