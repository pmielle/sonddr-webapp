<div id="container" class="flex column small-gap">
    <button *ngIf="this.mode as m" [style.backgroundColor]="m.color" mat-fab @fadeSlideInOut>
        <mat-icon>{{ m.icon }}</mat-icon>
    </button>
    <div *ngIf="this.mode as m" id="label" [style.color]="m.color" [innerHTML]="m.label"></div>
</div>
