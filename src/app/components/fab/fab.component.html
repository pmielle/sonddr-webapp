<div id="container" class="flex column small-gap">
    <button *ngIf="this.fab.mode as mode" [style.backgroundColor]="mode.color" mat-fab @fadeSlideInOut>
        <mat-icon>{{ mode.icon }}</mat-icon>
    </button>
    <div *ngIf="this.fab.mode as mode" id="label" [style.color]="mode.color" [innerHTML]="mode.label"></div>
</div>
