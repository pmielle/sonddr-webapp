<div id="container" class="flex column small-gap">
    <button *ngIf="this.chooseMode() as mode" (click)="this.onClick()" [style.backgroundColor]="mode.color" mat-fab @fadeSlideInOut>
        <mat-icon>{{ mode.icon }}</mat-icon>
    </button>
    <div *ngIf="this.chooseMode() as mode" id="label" [style.color]="mode.color" [innerHTML]="mode.label"></div>
</div>
