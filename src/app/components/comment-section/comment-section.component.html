<div id="input" class="flex align-end">
    <mat-form-field>
        <mat-label>What do you think?</mat-label>
        <textarea matInput [(ngModel)]="this.content" [ngModelOptions]="{standalone: true}"></textarea>
    </mat-form-field>
    <button id="send" mat-raised-button (click)="this.postComment()"><mat-icon>send</mat-icon>Comment</button>
</div>

<div id="comments">
    <div class="flex">
        <div class="spacer"></div>
        <mat-form-field appearance="fill">
            <mat-label>Order by</mat-label>
            <mat-select [(value)]="this.orderByField">
                <mat-option *ngFor="let field of this.CommentOrderBy | keyvalue" [value]="field.value">
                    {{ field.key }}
                </mat-option>
            </mat-select>
        </mat-form-field>
    </div>
    <div id="content">
        <p *ngFor="let comment of this.comments">{{comment.content}}</p>
    </div>
</div>
